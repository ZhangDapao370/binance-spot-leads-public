<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Binance 官方现货新币公告、交易对、开盘时间和项目入口的公开只读列表。">
    <meta property="og:title" content="Binance 现货新币台">
    <meta property="og:description" content="只收录 Binance 新增现货币种，每天自动更新，提供 AI JSON。">
    <meta property="og:image" content="https://zhangdapao370.github.io/binance-spot-leads-public/og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#f3ba2f">
    <title>Binance 现货新币台</title>
    <link rel="icon" type="image/png" href="og.png">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">BN</div>
          <div>
            <h1>Binance 现货新币台</h1>
            <p>官方现货上币公告</p>
          </div>
        </div>
        <div class="header-actions">
          <span class="readonly-badge">公开只读</span>
          <span class="sync-state" id="sync-state">最近同步：正在读取</span>
          <a class="secondary-button" href="data/listings.json" target="_blank" rel="noreferrer">查看 AI 数据</a>
          <button class="primary-button" id="copy-endpoint" type="button">
            <span class="copy-icon" aria-hidden="true">⧉</span>复制 AI 接口
          </button>
        </div>
      </header>

      <section class="stat-strip" aria-label="现货新币概览">
        <div><span>现货新币</span><strong id="stat-total">-</strong></div>
        <div><span>Seed Tag</span><strong class="accent-amber" id="stat-seed">-</strong></div>
        <div><span>已有官网</span><strong class="accent-green" id="stat-websites">-</strong></div>
        <div><span>待开盘</span><strong class="accent-blue" id="stat-upcoming">-</strong></div>
        <p>只收录 Binance 新增现货币种，不包含期货、永续合约、Alpha 或普通新增交易对。</p>
      </section>

      <section class="workspace" aria-label="现货新币列表">
        <div class="workspace-heading">
          <div>
            <h2>现货上币记录</h2>
            <p id="result-count">正在读取公开数据</p>
          </div>
          <div class="notice hidden" id="notice" role="status"></div>
        </div>

        <div class="filterbar">
          <label class="search-box">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <span class="sr-only">搜索项目</span>
            <input id="search-input" type="search" placeholder="搜索项目名、币种简称、交易对或公告">
          </label>
          <div class="tag-filter" aria-label="风险标签筛选">
            <button class="active" type="button" data-tag="全部">全部标签</button>
            <button type="button" data-tag="Seed">Seed Tag</button>
            <button type="button" data-tag="普通">普通</button>
          </div>
          <select id="status-filter" aria-label="开盘状态筛选">
            <option value="全部">全部状态</option>
            <option value="待开盘">待开盘</option>
            <option value="已开盘">已开盘</option>
            <option value="时间待确认">时间待确认</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>项目</th>
                <th>现货交易对</th>
                <th>公告时间</th>
                <th>开盘时间</th>
                <th>项目入口</th>
                <th>风险标签</th>
                <th><span class="sr-only">展开</span></th>
              </tr>
            </thead>
            <tbody id="listing-table-body"></tbody>
          </table>
        </div>

        <div class="mobile-list" id="mobile-list"></div>
        <div class="empty-state hidden" id="empty-state">
          <strong>没有符合条件的记录</strong>
          <span>调整搜索词或筛选条件后再看。</span>
        </div>
      </section>

      <footer class="page-footer">
        <span>数据来自 Binance 官方公告</span>
        <span>时间统一按北京时间显示</span>
        <span>仅供信息整理，不构成投资建议</span>
      </footer>
    </main>
    <noscript><p class="noscript">遇到错误：页面需要启用 JavaScript 才能读取公开数据。</p></noscript>
  </body>
</html>

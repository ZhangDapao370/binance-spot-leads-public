<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Binance 官方现货新币和新上线永续合约的公开只读监控台。">
    <meta property="og:title" content="Binance 上新监控台">
    <meta property="og:description" content="分别跟踪 Binance 现货新币与永续合约，每天自动更新，提供 AI JSON。">
    <meta property="og:image" content="https://zhangdapao370.github.io/binance-spot-leads-public/og-v2.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#f3ba2f">
    <title>Binance 上新监控台</title>
    <link rel="icon" type="image/png" href="og-v2.png">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">BN</div>
          <div>
            <h1>Binance 上新监控台</h1>
            <p>现货新币与永续合约</p>
          </div>
        </div>
        <div class="header-actions">
          <span class="readonly-badge">公开只读</span>
          <span class="sync-state" id="sync-state">最近同步：正在读取</span>
          <a class="secondary-button" id="current-data-link" href="data/listings.json" target="_blank" rel="noreferrer">查看当前 AI 数据</a>
          <button class="primary-button" id="copy-endpoint" type="button">
            <span class="copy-icon" aria-hidden="true">⧉</span>复制 AI 接口
          </button>
        </div>
      </header>

      <section class="stat-strip" aria-label="市场上新概览">
        <div><span>现货新币</span><strong id="stat-spot">-</strong></div>
        <div><span>永续合约</span><strong class="accent-amber" id="stat-contracts">-</strong></div>
        <div><span>待开盘</span><strong class="accent-blue" id="stat-upcoming">-</strong></div>
        <div><span>数据来源</span><strong class="source-stat">官方</strong></div>
        <p>现货与永续合约分开解析和展示。永续合约上线不代表对应资产已经在 Binance 现货上线。</p>
      </section>

      <section class="workspace" aria-label="Binance 上新列表">
        <div class="workspace-heading">
          <div>
            <h2 id="workspace-title">现货上币记录</h2>
            <p id="result-count">正在读取公开数据</p>
          </div>
          <div class="notice hidden" id="notice" role="status"></div>
        </div>

        <div class="market-tabs" role="tablist" aria-label="数据类型">
          <button class="active" type="button" role="tab" aria-selected="true" data-view="spot">
            现货新币 <span id="spot-tab-count">-</span>
          </button>
          <button type="button" role="tab" aria-selected="false" data-view="perpetual">
            永续合约 <span id="contract-tab-count">-</span>
          </button>
        </div>

        <div class="filterbar">
          <label class="search-box">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <span class="sr-only">搜索项目</span>
            <input id="search-input" type="search" placeholder="搜索项目、币种、合约或公告">
          </label>
          <div class="tag-filter" id="spot-tag-filter" aria-label="现货风险标签筛选">
            <button class="active" type="button" data-tag="全部">全部标签</button>
            <button type="button" data-tag="Seed">Seed Tag</button>
            <button type="button" data-tag="普通">普通</button>
          </div>
          <select class="hidden" id="asset-filter" aria-label="合约标的类别筛选">
            <option value="全部">全部标的</option>
            <option value="加密资产">加密资产</option>
            <option value="股票">股票</option>
            <option value="指数">指数</option>
            <option value="商品">商品</option>
          </select>
          <select id="status-filter" aria-label="开盘状态筛选">
            <option value="全部">全部状态</option>
            <option value="待开盘">待开盘</option>
            <option value="已开盘">已开盘</option>
            <option value="时间待确认">时间待确认</option>
          </select>
        </div>

        <div class="table-wrap">
          <table id="market-table" data-view="spot">
            <thead>
              <tr>
                <th id="column-1">项目</th>
                <th id="column-2">现货交易对</th>
                <th id="column-3">公告时间</th>
                <th id="column-4">开盘时间</th>
                <th id="column-5">项目入口</th>
                <th id="column-6">风险标签</th>
                <th><span class="sr-only">展开</span></th>
              </tr>
            </thead>
            <tbody id="market-table-body"></tbody>
          </table>
        </div>

        <div class="mobile-list" id="mobile-list"></div>
        <div class="empty-state hidden" id="empty-state">
          <strong>没有符合条件的记录</strong>
          <span>调整搜索词或筛选条件后再看。</span>
        </div>
      </section>

      <footer class="page-footer">
        <span>数据来自 Binance 官方公告</span>
        <span>时间统一按北京时间显示</span>
        <span>永续合约含杠杆与强平风险，不构成投资建议</span>
      </footer>
    </main>
    <noscript><p class="noscript">遇到错误：页面需要启用 JavaScript 才能读取公开数据。</p></noscript>
  </body>
</html>

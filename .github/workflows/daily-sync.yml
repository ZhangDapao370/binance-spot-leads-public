name: 每日更新 Binance 现货新币

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: binance-spot-daily-sync
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 读取公开站代码
        uses: actions/checkout@v7

      - name: 准备 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: python -m pip install -r requirements.txt

      - name: 运行解析测试
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: 抓取 Binance 官方现货公告
        run: |
          python scripts/binance_spot_listing_monitor.py \
            --no-proxy \
            --limit 30 \
            --scan-pages 30 \
            --include-seen \
            --csv /tmp/binance_spot_new.csv \
            --json /tmp/binance_spot_new.json \
            --all-csv data/listings.csv \
            --all-json data/listings.json \
            --state /tmp/binance_seen.json

      - name: 校验公开数据
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("data/listings.json").read_text(encoding="utf-8"))
          items = payload.get("items")
          if not payload.get("public_read_only"):
              raise SystemExit("遇到错误：公开数据校验，返回内容：public_read_only 不是 true")
          if not isinstance(items, list) or not items:
              raise SystemExit("遇到错误：公开数据校验，返回内容：items 为空或不是列表")
          if any(item.get("listing_type") != "spot" for item in items):
              raise SystemExit("遇到错误：公开数据校验，返回内容：出现非现货记录")
          if any("Futures" in item.get("title", "") or "Perpetual" in item.get("title", "") for item in items):
              raise SystemExit("遇到错误：公开数据校验，返回内容：出现期货或永续公告")
          if any(not item.get("spot_pairs") for item in items):
              raise SystemExit("遇到错误：公开数据校验，返回内容：存在没有交易对的记录")
          if any("workflow_status" in item or "notes" in item for item in items):
              raise SystemExit("遇到错误：公开数据校验，返回内容：包含内部处理字段")
          print(f"完成：公开数据校验通过，共 {len(items)} 条现货记录")
          PY

      - name: 提交数据变化
        run: |
          if git diff --quiet -- data/listings.json data/listings.csv; then
            echo "完成：本次官方数据没有变化"
            exit 0
          fi
          git config user.name "Binance 现货新币自动任务"
          git config user.email "actions@users.noreply.github.com"
          git add data/listings.json data/listings.csv
          git commit -m "每日更新币安现货新币数据"
          git push
